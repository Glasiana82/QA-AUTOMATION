<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sessão da Tarde - Catálogo Nostálgico</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #000080; color: #fff; padding: 20px; }
        .container { background-color: #c0c0c0; color: #000; padding: 20px; border: 4px ridge #fff; max-width: 600px; margin: auto; }
        h1 { text-align: center; color: #000080; text-shadow: 2px 2px #fff; }
        input, button { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { background-color: #000080; color: #fff; font-weight: bold; cursor: pointer; border: 2px outset #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #000; padding: 8px; text-align: left; }

        /* Animação do Projetor de Cinema */
        .projetor-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid #000;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .projetor {
            position: relative;
            width: 200px;
            height: 150px;
        }

        /* Corpo do projetor */
        .projetor-corpo {
            width: 180px;
            height: 100px;
            background: linear-gradient(90deg, #333, #555, #333);
            border: 2px solid #222;
            border-radius: 10px;
            margin: 0 auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.8), inset -2px -2px 5px rgba(0,0,0,0.5);
        }

        /* Lente 1 (frontal) */
        .lente-1 {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 3px solid #444;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), rgba(0,0,0,0.8));
            top: 35px;
            left: 20px;
            animation: girarLente 2s linear infinite;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.8), 0 0 10px rgba(255,255,200,0.3);
        }

        /* Lente 2 (traseira) */
        .lente-2 {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid #555;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), rgba(0,0,0,0.9));
            top: 45px;
            right: 30px;
            animation: girarLente 3s linear infinite reverse;
            box-shadow: inset -1px -1px 3px rgba(0,0,0,0.8);
        }

        /* Luz do projetor */
        .luz-projetor {
            position: absolute;
            width: 150px;
            height: 200px;
            background: radial-gradient(ellipse at center, rgba(255,255,150,0.6) 0%, rgba(255,200,0,0.3) 40%, transparent 70%);
            top: -50px;
            left: 25px;
            animation: piscarLuz 0.5s ease-in-out infinite;
            filter: blur(20px);
        }

        /* Filme passando */
        .filme-strip {
            position: absolute;
            width: 250px;
            height: 40px;
            bottom: 10px;
            left: -50px;
            background: repeating-linear-gradient(90deg, #222 0px, #222 30px, #444 30px, #444 35px);
            animation: rolarFilme 2s linear infinite;
            opacity: 0.7;
        }

        .filme-strip::before,
        .filme-strip::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 100%;
            background: #111;
            top: 0;
        }

        .filme-strip::before {
            left: 5px;
        }

        .filme-strip::after {
            right: 5px;
        }

        /* Animações */
        @keyframes girarLente {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes piscarLuz {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }

        @keyframes rolarFilme {
            0% { transform: translateX(0); }
            100% { transform: translateX(250px); }
        }

        /* Texto de boas-vindas */
        .sessao-titulo {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            animation: piscarTexto 1s ease-in-out infinite;
        }

        @keyframes piscarTexto {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sessão da Tarde</h1>

    <div id="login-container">
        <h3>Login de Administrador</h3>
        <input type="email" id="email" placeholder="E-mail (    )" required>
        <input type="password" id="senha" placeholder="Senha (1234)" required>
        <button id="btn-login" onclick="fazerLogin()">ENTRAR</button>
        <p id="erro-login" style="color: red; display: none;">E-mail ou senha incorretos!</p>
    </div>

    <!-- TELA INICIAL: Projetor Animado + 2 botões -->
    <div id="tela-inicial-container" style="display: none;">
        <h3>Sessão da Tarde - Clássicos Globo</h3>
        
        <!-- Projetor de Cinema Animado -->
        <div class="projetor-container">
            <div class="sessao-titulo">▶ SESSÃO DA TARDE ▶</div>
            <div class="luz-projetor"></div>
            <div class="projetor">
                <div class="projetor-corpo"></div>
                <div class="lente-1"></div>
                <div class="lente-2"></div>
            </div>
            <div class="filme-strip"></div>
        </div>

        <button id="btn-cadastrar-novo" onclick="irParaCadastro()" style="margin-top: 20px;">CADASTRAR FILME</button>
        <button id="btn-listar-filmes" onclick="exibirListaFilmes()" style="background-color: #008000;">LISTAR FILMES</button>
    </div>

    <!-- TELA DE CADASTRO: 4 campos + 2 botões -->
    <div id="tela-cadastro-container" style="display: none;">
        <h3>Cadastrar Novo Filme</h3>
        <input type="text" id="titulo" placeholder="Título do Filme">
        <input type="number" id="ano" placeholder="Ano de Lançamento">
        <input type="text" id="genero" placeholder="Gênero">
        <input type="text" id="diretor" placeholder="Diretor">
        <button id="btn-cadastrar" onclick="cadastrarFilme()">CADASTRAR FILME</button>
        <button id="btn-listar" onclick="exibirListaFilmes()" style="background-color: #008000;">LISTAR FILMES</button>
    </div>

    <div id="lista-container" style="display: none;">
        <h3>Filmes Cadastrados</h3>
        <button id="btn-voltar" onclick="voltarParaCadastro()" style="background-color: #008000; margin-bottom: 20px;">VOLTAR AO CADASTRO</button>
        <button id="btn-logout" onclick="fazerLogout()" style="background-color: #8b0000;">SAIR</button>

        <table>
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Ano</th>
                    <th>Gênero</th>
                    <th>Diretor</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-filmes-lista">
                </tbody>
        </table>
    </div>
</div>

<script>
    function fazerLogin() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        const erro = document.getElementById('erro-login');

        // Regra de Negócio: Login específico
        if (email === 'admin@sessao.com' && senha === '1234') {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('tela-inicial-container').style.display = 'block';
        } else {
            erro.style.display = 'block';
        }
    }

    function irParaCadastro() {
        document.getElementById('tela-inicial-container').style.display = 'none';
        document.getElementById('tela-cadastro-container').style.display = 'block';
    }

async function cadastrarFilme() {

    const titulo = document.getElementById('titulo').value;
    const ano = document.getElementById('ano').value;
    const genero = document.getElementById('genero').value;
    const diretor = document.getElementById('diretor').value;

    if (!titulo || !ano || !genero || !diretor) {
        alert('Por favor, preencha todos os campos!');
        return;
    }

    try {

        const resposta = await fetch('http://localhost:3000/filmes', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                titulo,
                ano,
                genero,
                diretor
            })
        });

        const dados = await resposta.json();

        alert(dados.mensagem);

        // vai para a tela de listagem
        mostrarTelaLista();

    } catch (erro) {

        console.error(erro);

        alert('Erro ao salvar filme');
    }
}

function voltarParaCadastro() {
    document.getElementById('lista-container').style.display = 'none';
    document.getElementById('tela-inicial-container').style.display = 'block';
}

function mostrarTelaLista() {
    document.getElementById('tela-cadastro-container').style.display = 'none';
    document.getElementById('lista-container').style.display = 'block';
    carregarFilmes();
}

function exibirListaFilmes() {
    document.getElementById('tela-inicial-container').style.display = 'none';
    document.getElementById('tela-cadastro-container').style.display = 'none';
    document.getElementById('lista-container').style.display = 'block';
    carregarFilmes();
}

function fazerLogout() {
    document.getElementById('login-container').style.display = 'block';
    document.getElementById('tela-inicial-container').style.display = 'none';
    document.getElementById('tela-cadastro-container').style.display = 'none';
    document.getElementById('lista-container').style.display = 'none';
    document.getElementById('email').value = '';
    document.getElementById('senha').value = '';
}

async function deletarFilme(id) {
    if (!confirm('Tem certeza que deseja deletar este filme?')) {
        return;
    }

    try {
        const resposta = await fetch(`http://localhost:3000/filmes/${id}`, {
            method: 'DELETE'
        });

        const dados = await resposta.json();

        alert(dados.mensagem);

        // recarregar tabela
        carregarFilmes();

    } catch (erro) {
        console.error(erro);
        alert('Erro ao deletar filme');
    }
}

async function alugarFilme(id) {
    try {
        // Buscar status atual do filme
        const resposta1 = await fetch('http://localhost:3000/filmes');
        const filmes = await resposta1.json();
        const filme = filmes.find(f => (f.id || f.Id) == id);
        
        if (!filme) {
            alert('Filme não encontrado!');
            return;
        }
        
        const statusAtual = filme.status || filme.Status || 'Liberado';
        const novoStatus = statusAtual === 'Liberado' ? 'Alugado' : 'Liberado';
        
        const resposta = await fetch(`http://localhost:3000/filmes/${id}/status`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ status: novoStatus })
        });
        
        const dados = await resposta.json();
        alert(dados.mensagem);
        
        // Recarregar tabela
        carregarFilmes();
        
    } catch (erro) {
        console.error(erro);
        alert('Erro ao atualizar status do filme');
    }
}

async function carregarFilmes() {

    try {

        const resposta = await fetch('http://localhost:3000/filmes');

        const filmes = await resposta.json();

        const tabela = document.getElementById('tabela-filmes-lista');

        tabela.innerHTML = '';

        filmes.forEach(filme => {
            const id = filme.id || filme.Id;
            const status = filme.status || filme.Status || 'Liberado';
            const statusBadgeColor = status === 'Alugado' ? '#ff6b6b' : '#51cf66';
            const botaoTexto = status === 'Alugado' ? 'LIBERAR' : 'ALUGAR';
            const botaoCor = status === 'Alugado' ? '#ffa500' : '#4c6ef5';
            
            tabela.innerHTML += `
                <tr id="filme-${id}">
                    <td>${filme.titulo || filme.Titulo}</td>
                    <td>${filme.ano || filme.Ano}</td>
                    <td>${filme.genero || filme.Genero}</td>
                    <td>${filme.diretor || filme.Diretor}</td>
                    <td>
                        <span style="background-color: ${statusBadgeColor}; color: white; padding: 5px 10px; border-radius: 4px; font-weight: bold;">${status}</span>
                    </td>
                    <td style="display: flex; gap: 5px;">
                        <button onclick="alugarFilme(${id})" style="flex: 1; background-color: ${botaoCor}; color: white; padding: 5px; border: none; border-radius: 4px; cursor: pointer;">${botaoTexto}</button>
                        <button onclick="deletarFilme(${id})" style="flex: 1; background-color: #dc143c; color: white; padding: 5px; border: none; border-radius: 4px; cursor: pointer;">DELETAR</button>
                    </td>
                </tr>
            `;
        });

    } catch (erro) {

        console.error(erro);

        alert('Erro ao carregar filmes');
    }
}

</script>

</body>
</html>
